name: iCal-Sync

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC = 04:00/05:00 Schweizer Zeit, je nach Sommer-/Winterzeit
  workflow_dispatch: {} # manueller Start über den «Run workflow»-Knopf auf GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsx scripts/sync-ical.ts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
